<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairy</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='%232568f4'/%3E%3Ccircle cx='50' cy='50' r='25' fill='white'/%3E%3Ccircle cx='50' cy='50' r='13' fill='%23095adf'/%3E%3C/svg%3E">
</head>
<body>
    <div class="app-container">
        <button class="sidebar-overlay" id="sidebar-overlay" aria-label="关闭侧边栏"></button>

        <aside class="sidebar" aria-label="主导航">
            <div class="brand-row">
                <div class="brand-mark agent-eye agent-eye-mini" aria-hidden="true">
                    <div class="eye-shell">
                        <div class="eye-white">
                            <div class="iris"></div>
                            <div class="catchlight"></div>
                        </div>
                        <div class="eyelid"></div>
                    </div>
                </div>
                <strong>Fairy</strong>
                <button class="sidebar-tool" id="sidebar-brand-toggle-btn" type="button" title="隐藏边栏" aria-label="隐藏边栏" aria-expanded="true">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="16" rx="3"></rect>
                        <path d="M9 4v16M14 10l-3 2 3 2"></path>
                    </svg>
                </button>
            </div>

            <button class="new-chat-btn" id="new-chat-btn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14M5 12h14"></path>
                </svg>
                <span>新建对话</span>
                <kbd>⌘K</kbd>
            </button>

            <nav class="nav-list" aria-label="Fairy 功能">
                <button class="nav-item active" type="button" data-sidebar-page="chat">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
                    </svg>
                    <span>对话</span>
                </button>
                <button class="nav-item" type="button" data-sidebar-page="explore">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="9"></circle>
                        <path d="m15 9-2.2 5.2L8 16l2.2-5.2z"></path>
                    </svg>
                    <span>探索</span>
                </button>
                <button class="nav-item" type="button" data-sidebar-page="agents">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="6" y="8" width="12" height="10" rx="3"></rect>
                        <path d="M12 4v4M9 13h.01M15 13h.01M8 20h8"></path>
                    </svg>
                    <span>智能体</span>
                </button>
                <button class="nav-item" type="button" data-sidebar-page="plugins">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 10h16v10H4zM7 10V7a5 5 0 0 1 10 0v3"></path>
                    </svg>
                    <span>插件商店</span>
                </button>
            </nav>

            <section class="agent-section" id="agent-section" aria-label="智能体" hidden>
                <div class="agent-section-head">
                    <span class="agent-section-kicker">AGENTS</span>
                    <button class="sidebar-tool agent-back-btn" id="agent-back-btn" type="button" title="返回对话" aria-label="返回对话">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15 18l-6-6 6-6"></path>
                        </svg>
                    </button>
                </div>
                <div class="agent-grid" id="agent-grid"></div>
            </section>

            <div class="history-section">
                <div class="chat-history" id="chat-history" aria-label="对话历史"></div>
                <button class="show-all-btn" type="button">
                    <span>查看全部对话</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </button>
            </div>

        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="sidebar-toggle-btn" type="button" title="打开边栏" aria-label="打开边栏" aria-expanded="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="16" rx="3"></rect>
                            <path d="M9 4v16M13 10l3 2-3 2"></path>
                        </svg>
                    </button>
                    <h1 class="chat-title">Fairy</h1>
                    <div class="model-switcher">
                        <button class="title-switch" id="model-menu-btn" type="button" aria-label="切换 Fairy 模型" aria-haspopup="menu" aria-expanded="false">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="m6 9 6 6 6-6"></path>
                            </svg>
                        </button>
                        <div class="model-menu" id="model-menu" role="menu" hidden>
                            <button type="button" role="menuitemradio" data-model="deepseek-v4-flash" aria-checked="true">
                                <span class="model-glyph flash" aria-hidden="true"></span>
                                <strong>fairy-fast</strong>
                                <span class="model-check" aria-hidden="true"></span>
                            </button>
                            <button type="button" role="menuitemradio" data-model="deepseek-v4-pro" aria-checked="false">
                                <span class="model-glyph pro" aria-hidden="true"></span>
                                <strong>fairy-pro</strong>
                                <span class="model-check" aria-hidden="true"></span>
                            </button>
                        </div>
                    </div>
                    <span class="agent-mode-mark" id="agent-mode-mark" aria-hidden="true"></span>
                    <span class="status-badge" id="status-badge">
                        <span class="status-dot online"></span>
                        在线
                    </span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="spark-btn" type="button" title="灵感" aria-label="灵感">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8zM19 16l.8 2.2L22 19l-2.2.8L19 22l-.8-2.2L16 19l2.2-.8z"></path>
                        </svg>
                    </button>
                    <button class="icon-btn text-btn" id="share-btn" type="button">分享</button>
                    <button class="icon-btn" id="settings-btn" type="button" title="设置" aria-label="设置">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"></path>
                            <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.1 2.1 0 0 1-2.97 2.97l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.09 1.65V21.3a2.1 2.1 0 0 1-4.2 0v-.06a1.8 1.8 0 0 0-1.09-1.65 1.8 1.8 0 0 0-1.98.36l-.04.04a2.1 2.1 0 1 1-2.97-2.97l.04-.04A1.8 1.8 0 0 0 3.85 15a1.8 1.8 0 0 0-1.65-1.09H2.1a2.1 2.1 0 0 1 0-4.2h.1a1.8 1.8 0 0 0 1.65-1.09 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.1 2.1 0 1 1 2.97-2.97l.04.04a1.8 1.8 0 0 0 1.98.36A1.8 1.8 0 0 0 9.53 2.4V2.1a2.1 2.1 0 0 1 4.2 0v.3a1.8 1.8 0 0 0 1.09 1.65 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.1 2.1 0 0 1 2.97 2.97l-.04.04a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.65 1.09h.14a2.1 2.1 0 0 1 0 4.2h-.14A1.8 1.8 0 0 0 19.4 15z"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <section class="welcome-screen" id="welcome-screen" aria-label="Fairy 欢迎页">
                    <div class="agent-stage">
                        <div class="agent-aura" aria-hidden="true"></div>
                        <div class="breath-field" aria-hidden="true"></div>
                        <div class="agent-eye agent-eye-hero" id="agent-eye" aria-label="Fairy 智能体头像" role="img">
                            <div class="eye-shell">
                                <div class="eye-white">
                                    <div class="iris"></div>
                                    <div class="catchlight"></div>
                                </div>
                                <div class="eyelid"></div>
                                <div class="thinking-line"></div>
                            </div>
                        </div>
                        <span class="agent-stage-mark" id="agent-stage-mark" aria-hidden="true"></span>
                    </div>
                    <h2>我是 Fairy，你的智能管家</h2>
                    <div class="breath-lamp" aria-hidden="true"></div>
                </section>
            </div>

            <div class="quick-prompts" id="quick-prompts" aria-label="推荐问题">
                <button class="suggestion-card" data-prompt="量子计算如何影响加密技术？" type="button">量子计算如何影响加密技术？</button>
                <button class="suggestion-card" data-prompt="目前量子计算的主要挑战是什么？" type="button">目前量子计算的主要挑战是什么？</button>
                <button class="suggestion-card" data-prompt="量子计算与人工智能的结合前景如何？" type="button">量子计算与人工智能的结合前景如何？</button>
                <button class="refresh-prompts" type="button" aria-label="换一批问题">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 12a8 8 0 0 1-13.6 5.7M4 12A8 8 0 0 1 17.6 6.3M17 3v4h4M7 21v-4H3"></path>
                    </svg>
                </button>
            </div>

            <button class="composer-toggle" id="composer-toggle" type="button" aria-label="显示输入框" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m7 14 5-5 5 5"></path>
                </svg>
            </button>

            <form class="input-area" id="chat-form">
                <div class="input-wrapper">
                    <button class="tool-btn input-plus-btn" id="input-actions-btn" type="button" title="添加附件" aria-label="添加附件">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 5v14M5 12h14"></path>
                        </svg>
                    </button>
                    <textarea
                        id="user-input"
                        placeholder="问 Fairy"
                        rows="1"
                        autocomplete="off"
                    ></textarea>
                    <div class="input-toolbar">
                        <button class="tool-btn" type="button" title="联网搜索" aria-label="联网搜索">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="9"></circle>
                                <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"></path>
                            </svg>
                        </button>
                        <button class="search-toggle" type="button">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"></path>
                            </svg>
                            联网搜索
                        </button>
                        <span class="toolbar-spacer"></span>
                        <button class="tool-btn voice-btn" id="voice-btn" type="button" title="语音输入" aria-label="语音输入">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V6a3 3 0 0 1 3-3zM19 11v1a7 7 0 0 1-14 0v-1M12 19v3M8 22h8"></path>
                            </svg>
                        </button>
                        <button class="send-btn" id="send-btn" type="submit" aria-label="发送">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 19V5M5 12l7-7 7 7"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <p class="voice-hint" id="voice-hint">AI生成内容仅供参考，请核实重要信息</p>
            </form>
        </main>

        <button class="settings-overlay" id="settings-overlay" type="button" aria-label="关闭设置"></button>
        <aside class="settings-panel" id="settings-panel" aria-label="设置" aria-hidden="true">
            <div class="settings-header">
                <div>
                    <p>Fairy 设置</p>
                    <h2>个性化与智能偏好</h2>
                </div>
                <button class="settings-close-btn" id="settings-close-btn" type="button" aria-label="关闭设置">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18 6 6 18M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="settings-body">
                <section class="settings-section account-section">
                    <h3>账户</h3>
                    <div class="profile-card account-settings-card">
                        <div class="profile-avatar" aria-hidden="true"></div>
                        <div class="profile-identity">
                            <strong>StarDust</strong>
                            <span>Pro</span>
                        </div>
                        <button class="profile-menu" type="button" aria-label="更多账号选项">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 6h.01M12 12h.01M12 18h.01"></path>
                            </svg>
                        </button>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>外观</h3>
                    <div class="setting-row vertical">
                        <div>
                            <strong>明暗模式</strong>
                            <span>白天、夜间，或跟随系统设置自动切换</span>
                        </div>
                        <div class="segmented-control" data-setting-group="appearance">
                            <button type="button" data-appearance-mode="system">跟随系统</button>
                            <button type="button" data-appearance-mode="light">白天</button>
                            <button type="button" data-appearance-mode="dark">夜间</button>
                        </div>
                    </div>

                    <div class="setting-row vertical">
                        <div>
                            <strong>主题颜色</strong>
                            <span>选择 Fairy 的主色调</span>
                        </div>
                        <div class="theme-swatches" aria-label="主题颜色">
                            <button class="theme-swatch blue" type="button" data-theme="blue" aria-label="蓝色主题"></button>
                            <button class="theme-swatch violet" type="button" data-theme="violet" aria-label="紫色主题"></button>
                            <button class="theme-swatch green" type="button" data-theme="green" aria-label="绿色主题"></button>
                            <button class="theme-swatch ink" type="button" data-theme="ink" aria-label="深蓝主题"></button>
                        </div>
                    </div>

                    <div class="setting-row vertical">
                        <div>
                            <strong>字体大小</strong>
                            <span>影响消息、输入框和设置面板</span>
                        </div>
                        <div class="segmented-control" data-setting-group="fontSize">
                            <button type="button" data-font-size="small">小</button>
                            <button type="button" data-font-size="medium">标准</button>
                            <button type="button" data-font-size="large">大</button>
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>通知</h3>
                    <label class="setting-row">
                        <div>
                            <strong>回答完成提醒</strong>
                            <span>Fairy 完成回答时发送浏览器通知</span>
                        </div>
                        <button class="switch-btn" id="notifications-toggle" type="button" role="switch" aria-checked="false"></button>
                    </label>
                </section>

                <section class="settings-section">
                    <h3>AI 应用偏好</h3>
                    <label class="setting-row">
                        <div>
                            <strong>默认联网搜索</strong>
                            <span>新对话默认点亮联网搜索模式</span>
                        </div>
                        <button class="switch-btn" id="web-search-toggle" type="button" role="switch" aria-checked="true"></button>
                    </label>

                    <label class="setting-row">
                        <div>
                            <strong>自动朗读回答</strong>
                            <span>Fairy 回复后自动播报内容</span>
                        </div>
                        <button class="switch-btn" id="auto-speak-toggle" type="button" role="switch" aria-checked="false"></button>
                    </label>

                    <label class="setting-row vertical">
                        <div>
                            <strong>上下文记忆长度</strong>
                            <span>控制每次请求携带最近多少轮对话</span>
                        </div>
                        <select class="settings-select" id="context-limit-select">
                            <option value="10">最近 10 轮</option>
                            <option value="25">最近 25 轮</option>
                            <option value="50">最近 50 轮</option>
                        </select>
                    </label>

                    <label class="setting-row vertical">
                        <div>
                            <strong>回答风格</strong>
                            <span>为后续智能体能力预留的偏好</span>
                        </div>
                        <select class="settings-select" id="response-style-select">
                            <option value="balanced">均衡</option>
                            <option value="concise">简洁</option>
                            <option value="detailed">详细</option>
                            <option value="creative">创意</option>
                        </select>
                    </label>
                </section>

                <section class="settings-section danger-zone">
                    <h3>对话管理</h3>
                    <button class="danger-btn" id="delete-conversation-btn" type="button">删除当前对话</button>
                </section>
            </div>
        </aside>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
