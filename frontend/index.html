<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairy AI News Lab</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <div class="app-container">
        <button class="sidebar-overlay" id="sidebar-overlay" aria-label="关闭侧边栏"></button>
        <aside class="sidebar" aria-label="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">✨</span>
                    <span class="logo-text">fairy</span>
                </div>
                <button class="new-chat-btn" id="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    新对话
                </button>
            </div>
            <div class="sidebar-content">
                <div class="chat-history" id="chat-history">
                    <div class="chat-history-item active">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>当前对话</span>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="model-selector">
                    <select id="model-select">
                        <option value="default">🤖 默认</option>
                        <option value="fast">⚡ 快速响应</option>
                        <option value="creative">💡 创意模式</option>
                    </select>
                </div>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="sidebar-toggle-btn" type="button" title="打开菜单">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h1 class="chat-title">Fairy AI News Lab</h1>
                    <span class="status-badge" id="status-badge">
                        <span class="status-dot online"></span>
                        在线
                    </span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="clear-chat-btn" title="清空对话">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                    <button class="icon-btn" id="settings-btn" title="设置">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                    </div>
                    <h2>你好，我是 fairy AI</h2>
                    <p>我现在支持新闻 RAG、Transformer 分类、情感分析、语音问答和语音播报<br>可以直接问我最近热点，也可以点击麦克风说话</p>
                    <div class="suggestion-cards">
                        <button class="suggestion-card" data-prompt="最近AI行业有什么新闻？">
                            <span class="card-icon">🤖</span>
                            <span>最近AI行业有什么新闻？</span>
                        </button>
                        <button class="suggestion-card" data-prompt="帮我分析一下最近财经新闻的情感倾向">
                            <span class="card-icon">📊</span>
                            <span>分析财经新闻情感</span>
                        </button>
                        <button class="suggestion-card" data-prompt="总结一下今天的科技热点">
                            <span class="card-icon">🧠</span>
                            <span>总结今天科技热点</span>
                        </button>
                        <button class="suggestion-card" data-prompt="北京今天天气怎么样">
                            <span class="card-icon">🌤️</span>
                            <span>北京今天天气怎么样</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <button class="voice-btn" id="voice-btn" title="语音输入">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 1 3 3v8a3 3 0 0 1-6 0V4a3 3 0 0 1 3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button class="input-actions-btn" id="input-actions-btn" title="更多功能">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <textarea 
                        id="user-input" 
                        placeholder="发送消息..." 
                        rows="1"
                        autocomplete="off"
                    ></textarea>
                    <button class="send-btn" id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer" id="voice-hint">AI生成内容仅供参考，请核实重要信息</p>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
